name: Feature Request
description: Suggest a new feature or improvement for FEZrs
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your suggested solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe alternative solutions or features.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add references, screenshots, papers, or examples.
