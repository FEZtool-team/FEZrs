name: FEZrs Citation Update

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit and push CITATION.cff when it changes"
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ["PyPI Publish"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-citation:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate CITATION.cff
        run: python .github/scripts/update_citation.py

      - name: Show generated diff
        run: git diff -- CITATION.cff

      - name: Commit updated citation
        if: github.event_name != 'workflow_dispatch' || inputs.commit
        run: |
          if git diff --quiet -- CITATION.cff; then
            echo "CITATION.cff is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git commit -m "Update CITATION.cff"
          git push

      - name: Skip citation commit
        if: github.event_name == 'workflow_dispatch' && !inputs.commit
        run: echo "Commit disabled for this workflow_dispatch run."
